name: 打包我的Windows工具

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装运行环境
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 开始组装打包
        run: |
          # 关键修改：增加 --onedir 参数让结构清晰，并显式指定 tldextract
          pyinstaller --noconsole --onedir --clean --add-data "rf_model.pkl;." --hidden-import sklearn --hidden-import sklearn.ensemble --hidden-import tldextract --collect-all sklearn main.py
      - name: 导出成品
        uses: actions/upload-artifact@v4
        with:
          name: URL-Detector-V2  # 换个简单的名字防止中文路径干扰
          path: dist/main/
